<head>

  <style>
    body {
        margin: 0;

        background-size: cover;

    }

    /* center everything */
    .center-box {
        height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
    }

    /* 🔥 NEW TEXT BOX */
    .text-box {
        background: rgba(0, 0, 0, 0.6);
        padding: 30px 60px;
        border-radius: 15px;
        border: 2px solid rgba(255, 0, 0, 0.6);
        color: white;
        font-size: 24px;
        text-align: center;
        backdrop-filter: blur(5px);
        box-shadow: 0 0 25px rgba(255, 0, 0, 0.5);
    }

    /* buttons layout */
    .button-row {
        display: flex;
        justify-content: center;
        gap: 200px;
        margin-top: 20px;
    }

    /* button base */
    button {
        background: none;
        border: none;
        cursor: pointer;
    }

    /* button images */
    button img {
        width: 400px;
        transition: transform 0.2s ease, filter 0.2s ease, box-shadow 0.2s ease;
    }

    /* hover effect */
    button:hover img {
        transform: scale(1.1);
        filter: brightness(1.2);
        box-shadow: 0 0 20px red;
    }

    /* dim other button */
    .button-row:hover img {
        filter: brightness(0.7);
    }

    .button-row button:hover img {
        filter: brightness(1.2);
    }
  </style>
</head>
