<!DOCTYPE html>
<html>
<head>
  <title>Secret 👀</title>

  <style>
body {
    margin: 0;
    background-image:
        linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)),
        url('bg.png');
    background-size: cover;
    background-position: calc(50% + 20px) center;
    color: white;
}

.center-box {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center; /* fixes text alignment */
}

.button-row {
    display: flex;
    justify-content: center; /* ensures buttons are centered */
    gap: 200px; /* reduced from 200px for better balance */
    margin-top: 20px;
}

button {
    background: none;
    border: none;
    cursor: pointer;
}

button img {
    width: 400px;
}
  </style>
</head>

<body>
  <div class="center-box">

    <h1>Choose wisely...</h1>

    <div class="button-row">
      <button onclick="window.location.href='page2.html'">
        <img src="choice1.png">
      </button>

      <button onclick="window.location.href='page2.html'">
        <img src="choice2.png">
      </button>
    </div>

  </div>
</body>
</html>
