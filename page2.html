<!DOCTYPE html>
<html>
<head>
  <title>Message</title>

  <style>
    body {
        margin: 0;
        background: black;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        overflow: hidden;
        color: red;
        font-family: monospace;
    }

    /* 🔥 VIDEO CONTAINER (IMPORTANT) */
    #videoContainer {
        position: absolute;
        transition: opacity 1s ease;
    }

    #videoContainer.fade-out {
        opacity: 0;
    }

    /* VIDEO */
    video {
        max-width: 90%;
        max-height: 90%;
        border: 3px solid red;
        box-shadow: 0 0 30px red;
    }

    /* 🔥 SEARCH SCREEN (UNDER VIDEO) */
    #searchScreen {
        position: absolute;
        opacity: 0;
        transition: opacity 1s ease;
        text-align: center;
    }

    #searchScreen.show {
        opacity: 1;
    }

    input {
        background: black;
        border: 2px solid red;
        color: red;
        padding: 10px;
        font-size: 20px;
        width: 300px;
        outline: none;
        text-align: center;
    }

    button {
        margin-top: 10px;
        padding: 10px 20px;
        background: black;
        border: 2px solid red;
        color: red;
        cursor: pointer;
    }

    /* 🔥 ERROR FLASH */
    #error {
        margin-top: 10px;
        color: crimson;
        opacity: 0;
    }

    #error.flash {
        animation: flashError 0.3s;
    }

    @keyframes flashError {
        0% { opacity: 0; }
        50% { opacity: 1; }
        100% { opacity: 0; }
    }
  </style>
</head>

<body>

  <!-- 🔥 VIDEO + BORDER WRAPPED -->
  <div id="videoContainer">
    <video 
      id="vid" 
      autoplay 
      muted 
      controls 
      controlsList="nodownload nofullscreen noremoteplayback"
      disablePictureInPicture
    >
      <source src="video.mp4" type="video/mp4">
    </video>
  </div>

  <!-- 🔥 SEARCH SCREEN (HIDDEN BEHIND) -->
  <div id="searchScreen">
    <div>ENTER ACCESS CODE</div>

    <input 
      id="input" 
      name="access_code_9283"
      placeholder="enter url..." 
      autocomplete="off" 
      autocorrect="off" 
      autocapitalize="off" 
      spellcheck="false"
    >

    <br>
    <button onclick="check()">ENTER</button>
    <div id="error">ACCESS DENIED</div>
  </div>

  <script>
    const vid = document.getElementById("vid");
    const container = document.getElementById("videoContainer");
    const search = document.getElementById("searchScreen");
    const error = document.getElementById("error");

    // 🔊 enable sound after autoplay
    vid.addEventListener("play", () => {
        vid.muted = false;
        vid.volume = 0.5;
    });

    // 🎬 when video ends
    vid.addEventListener("ended", () => {
        container.classList.add("fade-out");

        setTimeout(() => {
            container.style.display = "none";
            search.classList.add("show");
        }, 1000);
    });

    // 🔐 check input
    function check() {
        const value = document.getElementById("input").value.toLowerCase();

        if (value === "shadow") {
            window.location.href = "final.html";
        } else {
            error.classList.remove("flash");
            void error.offsetWidth;
            error.classList.add("flash");
        }
    }
  </script>

</body>
</html>
