<!DOCTYPE html>
<html>
<head>
  <title>Message</title>

  <style>
    body {
        margin: 0;
        background: black;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    video {
        max-width: 90%;
        max-height: 90%;
        border: 3px solid red;
        box-shadow: 0 0 30px red;
    }

    /* remove controls */
    video::-webkit-media-controls-volume-slider {
        display: none !important;
    }

    video::-webkit-media-controls-mute-button {
        display: none !important;
    }

    video::-webkit-media-controls-fullscreen-button {
        display: none !important;
    }

    video::-webkit-media-controls-overflow-button {
        display: none !important;
    }
  </style>
</head>

<body>

  <video id="vid" autoplay muted controls controlsList="nodownload nofullscreen noremoteplayback">
    <source src="video.mp4" type="video/mp4">
  </video>

  <script>
    const vid = document.getElementById("vid");

    // once video starts playing, enable sound at 50%
    vid.addEventListener("play", () => {
        vid.muted = false;
        vid.volume = 0.5; // 🔊 50% volume
    });
  </script>

</body>
</html>
